name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: darwin-arm64
            target: aarch64-apple-darwin
            os: macos-latest
            binary: restack
          - platform: darwin-x64
            target: x86_64-apple-darwin
            os: macos-latest
            binary: restack
          - platform: linux-x64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: restack
          - platform: win32-x64
            target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: restack.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary to npm package
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} npm/${{ matrix.platform }}/${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: npm/${{ matrix.platform }}/${{ matrix.binary }}

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Copy binaries to npm packages
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64 win32-x64; do
            cp artifacts/binary-${platform}/* npm/${platform}/
          done
          chmod +x npm/darwin-arm64/restack npm/darwin-x64/restack npm/linux-x64/restack || true

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for dir in npm/darwin-arm64 npm/darwin-x64 npm/linux-x64 npm/win32-x64 npm/restack-cli; do
            cd "$dir"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            cd "$GITHUB_WORKSPACE"
          done
          # Update optionalDependencies versions in routing package
          cd npm/restack-cli
          node -e "
            const pkg = require('./package.json');
            const v = '${VERSION}';
            for (const dep of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[dep] = v;
            }
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/darwin-arm64 npm/darwin-x64 npm/linux-x64 npm/win32-x64; do
            cd "$dir"
            npm publish --access public || echo "Failed to publish $dir"
            cd "$GITHUB_WORKSPACE"
          done

      - name: Publish routing package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/restack-cli
          npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
